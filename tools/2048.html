<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 - tbash.xyz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            min-height: 100dvh;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 12px;
            user-select: none;
            -webkit-user-select: none;
        }

        header { text-align: center; margin-bottom: 12px; }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: 2px;
        }

        header .subtitle { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }
        header .subtitle a { color: #60a5fa; text-decoration: none; }

        .hud {
            display: flex;
            gap: 10px;
            align-items: stretch;
            margin-bottom: 14px;
        }

        .score-box {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 10px;
            padding: 6px 16px;
            text-align: center;
            min-width: 90px;
        }

        .score-box .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }

        .score-box .value { font-size: 1.3rem; font-weight: 700; color: #f1f5f9; }

        .new-game {
            padding: 6px 16px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            background: rgba(59, 130, 246, 0.25);
            color: #e0e7ff;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.15s;
        }

        .new-game:hover { background: #3b82f6; color: #fff; }

        .board-wrap { position: relative; touch-action: none; }

        #board {
            position: relative;
            width: var(--board);
            height: var(--board);
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 12px;
            padding: var(--gap);
        }

        .bg-cell {
            position: absolute;
            width: var(--cell);
            height: var(--cell);
            background: rgba(51, 65, 85, 0.5);
            border-radius: 8px;
        }

        .tile {
            position: absolute;
            width: var(--cell);
            height: var(--cell);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            transition: left 0.12s ease-in-out, top 0.12s ease-in-out;
            z-index: 2;
        }

        .tile.new { animation: appear 0.18s ease 0.1s backwards; }
        .tile.merged { animation: pulse 0.2s ease 0.1s; z-index: 3; }

        @keyframes appear {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .t2    { background: #eee4da; color: #776e65; }
        .t4    { background: #ede0c8; color: #776e65; }
        .t8    { background: #f2b179; color: #f9f6f2; }
        .t16   { background: #f59563; color: #f9f6f2; }
        .t32   { background: #f67c5f; color: #f9f6f2; }
        .t64   { background: #f65e3b; color: #f9f6f2; }
        .t128  { background: #edcf72; color: #f9f6f2; }
        .t256  { background: #edcc61; color: #f9f6f2; }
        .t512  { background: #edc850; color: #f9f6f2; }
        .t1024 { background: #edc53f; color: #f9f6f2; }
        .t2048 { background: #edc22e; color: #f9f6f2; box-shadow: 0 0 20px rgba(237, 194, 46, 0.6); }
        .tbig  { background: #3b82f6; color: #fff; box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }

        .board-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 12, 25, 0.8);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        .board-overlay.show { opacity: 1; pointer-events: auto; }
        .board-overlay h2 { color: #f1f5f9; font-size: 1.6rem; }

        .board-overlay button {
            padding: 10px 24px;
            background: #3b82f6;
            border: none;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
        }

        .board-overlay button:hover { background: #2563eb; }
        .board-overlay .secondary { background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(148, 163, 184, 0.4); }

        .help {
            margin-top: 14px;
            font-size: 0.8rem;
            color: #94a3b8;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>2048</h1>
        <div class="subtitle"><a href="/">cd ..</a> · join tiles, reach 2048</div>
    </header>

    <div class="hud">
        <div class="score-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
        <div class="score-box"><div class="label">Best</div><div class="value" id="best">0</div></div>
        <button class="new-game" id="newGame">New Game</button>
    </div>

    <div class="board-wrap">
        <div id="board"></div>
        <div class="board-overlay" id="overlay">
            <h2 id="overlayTitle">Game Over</h2>
            <button id="overlayBtn">Try Again</button>
            <button class="secondary" id="keepGoing" style="display:none">Keep Going</button>
        </div>
    </div>

    <div class="help">Arrow keys / WASD or swipe to move</div>

    <script>
    const SIZE = 4;
    const BEST_KEY = 'game2048-best';
    const SAVE_KEY = 'game2048-save-v1';

    const board = document.getElementById('board');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayBtn = document.getElementById('overlayBtn');
    const keepGoingBtn = document.getElementById('keepGoing');

    let cellPx, gapPx;
    let grid;          // SIZE x SIZE of tile objects or null: {value, el}
    let score = 0;
    let best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
    let won = false;   // reached 2048 (and chose to keep going)
    let over = false;
    let animating = false;

    function layout() {
        const boardPx = Math.min(window.innerWidth - 24, 380);
        gapPx = Math.round(boardPx * 0.03);
        cellPx = Math.floor((boardPx - gapPx * (SIZE + 1)) / SIZE);
        const actual = cellPx * SIZE + gapPx * (SIZE + 1);
        board.style.setProperty('--board', actual + 'px');
        board.style.setProperty('--gap', gapPx + 'px');
        board.style.setProperty('--cell', cellPx + 'px');
    }

    function pos(rc) { return gapPx + rc * (cellPx + gapPx); }

    function fontSize(v) {
        const s = String(v).length;
        return Math.round(cellPx * (s <= 2 ? 0.5 : s === 3 ? 0.42 : s === 4 ? 0.34 : 0.28)) + 'px';
    }

    function buildBackground() {
        board.querySelectorAll('.bg-cell').forEach(el => el.remove());
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                const d = document.createElement('div');
                d.className = 'bg-cell';
                d.style.left = pos(c) + 'px';
                d.style.top = pos(r) + 'px';
                board.appendChild(d);
            }
        }
    }

    function tileClass(v) {
        return v <= 2048 ? 't' + v : 'tbig';
    }

    function makeTileEl(value, r, c, isNew) {
        const el = document.createElement('div');
        el.className = 'tile ' + tileClass(value) + (isNew ? ' new' : '');
        el.textContent = value;
        el.style.fontSize = fontSize(value);
        el.style.left = pos(c) + 'px';
        el.style.top = pos(r) + 'px';
        board.appendChild(el);
        return el;
    }

    function emptyCells() {
        const out = [];
        for (let r = 0; r < SIZE; r++)
            for (let c = 0; c < SIZE; c++)
                if (!grid[r][c]) out.push([r, c]);
        return out;
    }

    function spawnTile() {
        const empty = emptyCells();
        if (!empty.length) return;
        const [r, c] = empty[Math.floor(Math.random() * empty.length)];
        const value = Math.random() < 0.9 ? 2 : 4;
        grid[r][c] = { value, el: makeTileEl(value, r, c, true) };
    }

    function updateScore(add) {
        score += add;
        scoreEl.textContent = score;
        if (score > best) {
            best = score;
            localStorage.setItem(BEST_KEY, String(best));
        }
        bestEl.textContent = best;
    }

    function saveGame() {
        localStorage.setItem(SAVE_KEY, JSON.stringify({
            cells: grid.map(row => row.map(t => t ? t.value : 0)),
            score, won, over,
        }));
    }

    function loadGame() {
        try {
            const s = JSON.parse(localStorage.getItem(SAVE_KEY));
            if (!s || !Array.isArray(s.cells) || s.over) return false;
            grid = s.cells.map((row, r) => row.map((v, c) =>
                v ? { value: v, el: makeTileEl(v, r, c, false) } : null));
            score = s.score || 0;
            won = !!s.won;
            scoreEl.textContent = score;
            return true;
        } catch (e) { return false; }
    }

    function newGame() {
        board.querySelectorAll('.tile').forEach(el => el.remove());
        grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
        score = 0; won = false; over = false;
        scoreEl.textContent = '0';
        overlay.classList.remove('show');
        spawnTile();
        spawnTile();
        saveGame();
    }

    // Returns {moved, gained, merges:[{el...}]} — mutates grid and animates.
    function move(dr, dc) {
        // traversal order: iterate from the far side toward the move direction
        const rows = [...Array(SIZE).keys()];
        const cols = [...Array(SIZE).keys()];
        if (dr === 1) rows.reverse();
        if (dc === 1) cols.reverse();

        let moved = false, gained = 0;
        const mergedInto = new Set(); // tiles already merged this move

        for (const r of rows) {
            for (const c of cols) {
                const tile = grid[r][c];
                if (!tile) continue;
                let nr = r, nc = c;
                // slide as far as possible
                while (true) {
                    const tr = nr + dr, tc = nc + dc;
                    if (tr < 0 || tr >= SIZE || tc < 0 || tc >= SIZE) break;
                    if (grid[tr][tc]) break;
                    nr = tr; nc = tc;
                }
                const tr = nr + dr, tc = nc + dc;
                const target = (tr >= 0 && tr < SIZE && tc >= 0 && tc < SIZE) ? grid[tr][tc] : null;

                if (target && target.value === tile.value && !mergedInto.has(target)) {
                    // merge into target
                    grid[r][c] = null;
                    const newValue = tile.value * 2;
                    gained += newValue;
                    mergedInto.add(target);
                    moved = true;
                    // animate moving tile onto target, then upgrade target
                    tile.el.style.left = pos(tc) + 'px';
                    tile.el.style.top = pos(tr) + 'px';
                    const movingEl = tile.el, targetTile = target;
                    setTimeout(() => {
                        movingEl.remove();
                        targetTile.el.textContent = newValue;
                        targetTile.el.className = 'tile ' + tileClass(newValue) + ' merged';
                        targetTile.el.style.fontSize = fontSize(newValue);
                    }, 120);
                    target.value = newValue;
                    if (newValue === 2048 && !won) {
                        won = true;
                        setTimeout(showWin, 400);
                    }
                } else if (nr !== r || nc !== c) {
                    grid[r][c] = null;
                    grid[nr][nc] = tile;
                    tile.el.style.left = pos(nc) + 'px';
                    tile.el.style.top = pos(nr) + 'px';
                    moved = true;
                }
            }
        }
        return { moved, gained };
    }

    function canMove() {
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                const t = grid[r][c];
                if (!t) return true;
                if (r + 1 < SIZE && grid[r + 1][c] && grid[r + 1][c].value === t.value) return true;
                if (c + 1 < SIZE && grid[r][c + 1] && grid[r][c + 1].value === t.value) return true;
            }
        }
        return false;
    }

    function doMove(dr, dc) {
        if (over || animating) return;
        const { moved, gained } = move(dr, dc);
        if (!moved) return;
        animating = true;
        if (gained) updateScore(gained);
        setTimeout(() => {
            spawnTile();
            animating = false;
            if (!canMove()) {
                over = true;
                overlayTitle.textContent = 'Game Over';
                overlayBtn.textContent = 'Try Again';
                keepGoingBtn.style.display = 'none';
                overlay.classList.add('show');
            }
            saveGame();
        }, 130);
    }

    function showWin() {
        overlayTitle.textContent = '🎉 You made 2048!';
        overlayBtn.textContent = 'New Game';
        keepGoingBtn.style.display = '';
        overlay.classList.add('show');
        saveGame();
    }

    // ---------- Input ----------
    const KEYS = {
        ArrowUp: [-1, 0], ArrowDown: [1, 0], ArrowLeft: [0, -1], ArrowRight: [0, 1],
        w: [-1, 0], s: [1, 0], a: [0, -1], d: [0, 1],
        W: [-1, 0], S: [1, 0], A: [0, -1], D: [0, 1],
    };

    document.addEventListener('keydown', e => {
        const dir = KEYS[e.key];
        if (!dir) return;
        e.preventDefault();
        doMove(dir[0], dir[1]);
    });

    let touchStart = null;
    const wrap = document.querySelector('.board-wrap');

    wrap.addEventListener('touchstart', e => {
        if (e.touches.length === 1) {
            touchStart = [e.touches[0].clientX, e.touches[0].clientY];
        }
    }, { passive: true });

    wrap.addEventListener('touchend', e => {
        if (!touchStart) return;
        const dx = e.changedTouches[0].clientX - touchStart[0];
        const dy = e.changedTouches[0].clientY - touchStart[1];
        touchStart = null;
        if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
        if (Math.abs(dx) > Math.abs(dy)) doMove(0, dx > 0 ? 1 : -1);
        else doMove(dy > 0 ? 1 : -1, 0);
    }, { passive: true });

    overlayBtn.addEventListener('click', newGame);
    keepGoingBtn.addEventListener('click', () => overlay.classList.remove('show'));
    document.getElementById('newGame').addEventListener('click', newGame);

    window.addEventListener('resize', () => {
        const old = { cellPx, gapPx };
        layout();
        if (old.cellPx !== cellPx || old.gapPx !== gapPx) {
            buildBackground();
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const t = grid[r][c];
                    if (!t) continue;
                    t.el.style.left = pos(c) + 'px';
                    t.el.style.top = pos(r) + 'px';
                    t.el.style.fontSize = fontSize(t.value);
                }
            }
        }
    });

    // ---------- Init ----------
    layout();
    buildBackground();
    bestEl.textContent = best;
    if (!loadGame()) newGame();
    </script>
</body>
</html>
